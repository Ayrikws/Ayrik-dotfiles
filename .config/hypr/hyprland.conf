################
### MONITORS ###
################

monitor = ,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show


#################
### AUTOSTART ###
#################

 exec-once = waybar & swww-daemon & swaync
 exec-once = wl-paste --watch cliphist store
 exec-once = hyprctl setcursor Bibata-Modern-Classic 22
 exec-once = udiskie
 exec-once = hypridle

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,22
env = QT_QPA_PLATFORMTHEME,qt6ct

###################
### PERMISSIONS ###
###################

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgb(EBDBB2)
#    col.active_border = rgb(de8b5f)
#    col.inactive_border = rgba(00000000)
    col.inactive_border = rgba(50382dff)
    resize_on_border = true
    allow_tearing = false
    layout = scrolling 
}

decoration {
    rounding = 15
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = on
        ignore_opacity = on
        xray = false
    	contrast = 0.9      
        brightness = 0.8
        vibrancy = 0.18
    }
}
animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1
    animation = windows, 1, 5, overshot, popin 80%
    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 5, md3_accel, popin 80% # Or linear
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    animation = workspaces, 1, 4, md3_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false 
}

#############
### INPUT ###
#############

input {
    kb_layout = us,ir
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    force_no_accel = 1
    sensitivity = 0 

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

#################
### SCROLLING ###
#################

scrolling {
    column_width = 0.65               
    fullscreen_on_one_column = true
}

##############
### SOURCE ###
##############

source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/workspaceRules.conf
source = ~/.config/hypr/windowRules.conf

