###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, Delete, exit	
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh
bind = $mainMod, V, exec, ~/.local/bin/clipboard-manager.sh
bind = $mainMod, H, exec, hyprpicker -a 
bind = $mainMod, N,exec, /usr/bin/rofi-noter
bind = $mainMod, W, exec, python ~/.config/ayrik/ayrik.py --action select-wallpaper		
bind = $mainMod, T, exec, Telegram
bind = $mainMod, G, exec, ghostty
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, Z, exec, app.zen_browser.zen
bind = $mainMod SHIFT, F, exec, firefox	
bind = $mainMod SHIFT, O, exec, obsidian
bind = $mainMod SHIFT, T, exec, thorium-browser-avx2    
bind = $mainMod SHIFT, S, exec, hyprshot -m window
bind = $mainMod SHIFT, C, centerwindow #move a floating window to center
bind = Ctrl+Shift, R, exec, hyprctl reload

bind =, PRINT, exec, hyprshot -m output

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod+Ctrl, Right, workspace, r+1 												 
bind = $mainMod+Ctrl, Left, workspace, r-1 													 
bind = $mainMod+Ctrl, Down, workspace, empty												 
bind = $mainMod, mouse_down, workspace, r+1												 
bind = $mainMod, mouse_up, workspace, r-1	

bind = $mainMod+Alt, Space, togglegroup	
bind = $mainMod, Space, togglefloating	
bind = $mainMod, F, fullscreen,

binde = $mainMod+Shift, Right, resizeactive, 30 0                                             
binde = $mainMod+Shift, Left, resizeactive, -30 0                                             
binde = $mainMod+Shift, Up, resizeactive, 0 -30                                                 
binde = $mainMod+Shift, Down, resizeactive, 0 30                                             

bind = $mainMod+Shift+Ctrl, Right, movewindow, r                                             
bind = $mainMod+Shift+Ctrl, Left, movewindow, l                                              
bind = $mainMod+Shift+Ctrl, Up, movewindow, u                                                  
bind = $mainMod+Shift+Ctrl, Down, movewindow, d   

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#hyprscrolling-keybindings
bind = $mainMod, Right, layoutmsg, move +col
bind = $mainMod, Left,  layoutmsg, move -col

bind = $mainMod, P,     layoutmsg, promote
bind = $mainMod, L,     layoutmsg, togglefit
bind = $mainMod+Shift, E, layoutmsg, fit active

bind = $mainMod+Alt, Left,  layoutmsg, swapcol l
bind = $mainMod+Alt, Right, layoutmsg, swapcol r
bind = $mainMod+Alt, Up,    swapwindow, u
bind = $mainMod+Alt, Down,  swapwindow, d

bind = $mainMod+Shift, right, layoutmsg, colresize +0.1
bind = $mainMod+Shift, left,  layoutmsg, colresize -0.1

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindel = ,XF86MonBrightnessDown, exec, hyprctl hyprsunset gamma -10
bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

